name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z or vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: indices

jobs:
  verify-version:
    name: Verify tag and Cargo version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ inputs.version }}"
          tag_version="${requested#v}"
          cargo_version="$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)"

          if [[ -z "${cargo_version}" ]]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "Tag version ${tag_version} does not match Cargo version ${cargo_version}" >&2
            exit 1
          fi

          echo "version=${cargo_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${cargo_version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.asset_target }}
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_target: linux_x86_64
            archive_ext: tar.gz
            binary_name: indices
            use_cross: "false"
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_target: linux_arm64
            archive_ext: tar.gz
            binary_name: indices
            use_cross: "true"
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_target: darwin_x86_64
            archive_ext: tar.gz
            binary_name: indices
            use_cross: "false"
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_target: darwin_arm64
            archive_ext: tar.gz
            binary_name: indices
            use_cross: "false"
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_target: windows_x86_64
            archive_ext: zip
            binary_name: indices.exe
            use_cross: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == 'true'
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package unix archive
        if: matrix.archive_ext == 'tar.gz'
        id: package_unix
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.verify-version.outputs.version }}"
          asset_name="indices_${version}_${{ matrix.asset_target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${BIN_NAME}"
          mkdir -p dist
          tar -czf "dist/${asset_name}" "${BIN_NAME}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"

      - name: Package windows archive
        if: matrix.archive_ext == 'zip'
        id: package_windows
        shell: pwsh
        run: |
          $version = "${{ needs.verify-version.outputs.version }}"
          $assetName = "indices_${version}_${{ matrix.asset_target }}.zip"
          Copy-Item "target\\${{ matrix.target }}\\release\\${{ matrix.binary_name }}" "indices.exe"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path "indices.exe" -DestinationPath "dist\\$assetName" -Force
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.asset_target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - verify-version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: dist

      - name: Ensure release tag exists
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify-version.outputs.tag }}"

          git fetch --tags
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 0
          fi

          git config user.name "Indices CI"
          git config user.email "ci@indices.io"
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "${tag}"

      - name: Generate checksums
        id: checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.verify-version.outputs.version }}"
          checksum_file="indices_${version}_checksums.txt"

          cd dist
          files=( *.tar.gz *.zip )
          if [[ "${files[*]}" == "*.tar.gz *.zip" ]]; then
            echo "No release assets found in dist/" >&2
            exit 1
          fi

          : > "${checksum_file}"
          for file in "${files[@]}"; do
            [[ -f "${file}" ]] || continue
            sha256sum "${file}" >> "${checksum_file}"
          done

          echo "checksum_file=${checksum_file}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ steps.checksums.outputs.checksum_file }}
