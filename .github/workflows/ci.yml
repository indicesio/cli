name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Format, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify OpenAPI schema snapshot is up to date
        shell: bash
        run: |
          set -euo pipefail
          make generate-client

          if ! git diff --exit-code -- openapi/openapi.json; then
            echo "openapi/openapi.json is out of date with production." >&2
            echo "Run 'make generate-client' and commit the updated snapshot." >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo test
        run: cargo test --locked

      - name: Cargo build
        run: cargo build --locked

      - name: Validate installer script
        run: |
          sh -n install.sh
          shellcheck install.sh
